services:
  postgres:
    image: postgres:16
    container_name: six-affinities-database
    restart: always
    ports:
      - 5432:5432
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: six-affinities-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - 3000:3000
    environment:
      PORT: ${PORT}
      CORS_ORIGIN: ${CORS_ORIGIN}
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: ${DATABASE_URL}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: six-affinities-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - 5173:80
    environment:
      VITE_BACKEND_URL: ${VITE_BACKEND_URL}

volumes:
  db_data: